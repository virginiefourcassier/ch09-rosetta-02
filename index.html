<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Relativité du mouvement — Rosetta (simplifiée)</title>
  <style>
    html,body{height:100%;margin:0;background:#0b1220;color:#e5e7eb;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    .wrap{max-width:1040px;margin:0 auto;padding:14px;box-sizing:border-box}
    .top{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;margin-bottom:10px}
    .btns{display:flex;flex-wrap:wrap;gap:8px}
    button{
      cursor:pointer;border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.08);color:#e5e7eb;
      border-radius:10px;padding:8px 10px;font-weight:750;
    }
    button:hover{background:rgba(255,255,255,.12)}
    button.active{outline:2px solid rgba(255,255,255,.35)}
    .stage{
      width:100%;max-width:980px;margin:0 auto;
      background:#000;border-radius:14px;overflow:hidden;
      box-shadow:0 14px 30px rgba(0,0,0,.45);
    }
    canvas{display:block;width:100%;height:auto}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="btns" id="refBtns"></div>
      <div class="btns">
        <button id="playBtn">▶︎</button>
        <button id="resetBtn">↺ Reset</button>
        <button id="eraseBtn">🧽 Efface</button>
        <button id="speed1" class="active">×1</button>
        <button id="speed5">×5</button>
        <button id="speed20">×20</button>
        <button id="speed100">×100</button>
        <button id="zoom1" class="active">1×</button>
        <button id="zoom2">2×</button>
        <button id="zoom4">4×</button>
        <button id="zoom8">8×</button>
      </div>
    </div>

    <div class="stage">
      <canvas id="c" width="980" height="620"></canvas>
    </div>
  </div>

  <script src="app.js?v=4"></script>
</body>
</html>
